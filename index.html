<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Browser-based, deterministic firewall configuration translation to Juniper SRX — a migration draft requiring review." />
  <title>firewallintentconverter · a mechub project</title>
  <link rel="icon" type="image/svg+xml" href="%BASE_URL%brand/mechub-favicon.svg" />
</head>
<body>
  <script>
    // Apply saved theme immediately to prevent flash of wrong colors
    (function(){var t=localStorage.getItem('theme');if(t==='light'||t==='dark'){document.documentElement.setAttribute('data-theme',t)}else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches){document.documentElement.setAttribute('data-theme','light')}})();
  </script>
  <div id="root"></div>
  <script type="module" src="/public/main.jsx"></script>
</body>
</html>
